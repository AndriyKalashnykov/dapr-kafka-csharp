name: CI

on:
  # No trigger-level paths-ignore: it deadlocks with Repository Rulesets
  # (workflow never runs → `ci-pass` never reports → required-check gate
  # never clears). Heavy jobs gate on the `changes` detector below instead.
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

# Expose GITHUB_TOKEN to every step by default so tools that read it (mise/aqua, Renovate,
# gh CLI) authenticate against the GitHub API instead of hitting the 60/hour unauthenticated
# rate limit. GITHUB_TOKEN is auto-provisioned by GitHub Actions and passed through by `act`
# via the Makefile's `--secret GITHUB_TOKEN=...` flag.
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # Detector: decide whether the change touches code (heavy jobs run) or is
  # doc-only (heavy jobs skip; ci-pass treats skipped as pass). See the
  # `/ci-workflow` skill section "Path-Filter Strategy" for the rationale.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      # Tag pushes (`v*`) typically have tag SHA == main HEAD, so dorny/paths-filter
      # compares main→main and returns code=false, which would silently skip the
      # `docker` publish job. Force-true on tag refs so tag runs always go through
      # the full pipeline including publish + sign.
      code: ${{ startsWith(github.ref, 'refs/tags/') && 'true' || steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          # `base` is required by act-runner for offline `git diff` resolution but
          # ignored on PR events (paths-filter uses the PR's base ref instead).
          # Setting it only on push events avoids the PR-event annotation warning.
          base: ${{ github.event_name == 'push' && 'main' || '' }}
          filters: |
            code:
              - '!**.md'
              - '!LICENSE'
              - '!.gitignore'
              - '!.claudeignore'
              - '!.claude/**'
              - '!docs/**'
              - 'CLAUDE.md'

  static-check:
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Static check
        run: make lint

  build:
    needs: [changes, static-check]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Build
        run: make build

  test:
    needs: [changes, static-check]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Test
        run: make test

      - name: Upload test results
        # Skip under local `act` runs — act's embedded artifact-server speaks an
        # older protobuf format than upload-artifact@v7 (mime_type unknown field),
        # so 5 retries × 32s are wasted even with continue-on-error: true.
        if: ${{ always() && !env.ACT }}
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: '**/TestResults/**'
          retention-days: 7
          if-no-files-found: ignore

  integration-test:
    needs: [changes, static-check]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Integration test
        run: make integration-test

      - name: Upload integration test results
        # Skip under local `act` runs — see note on Upload test results above.
        if: ${{ always() && !env.ACT }}
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-test-results
          path: '**/TestResults/**'
          retention-days: 7
          if-no-files-found: ignore

  e2e:
    needs: [changes, build, test]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json

      - name: Install Dapr CLI
        run: |
          wget -q https://raw.githubusercontent.com/dapr/cli/master/install/install.sh -O - | /bin/bash -s 1.17.1
          dapr --version

      - name: Initialize Dapr (standalone mode)
        # Idempotent: tolerates a pre-existing Dapr install when the workflow runs
        # under `act` with the host's Docker socket (host may already have
        # `dapr_placement` running from prior `dapr init`). No-op on fresh
        # GitHub-hosted runners.
        run: |
          dapr uninstall --all 2>/dev/null || true
          dapr init

      - name: End-to-end tests
        run: |
          if [ -x e2e/e2e-compose-test.sh ]; then
            make e2e-compose
          else
            echo "No e2e script yet — run /test-coverage-analysis to scaffold"
          fi

  # E2E against the K8s deployment path: KinD + Dapr + Strimzi operator +
  # producer/consumer Deployments, asserting message flow via kubectl logs.
  # Note: helm/kind-action's nested containerd doesn't come up reliably under
  # `act`; skip this job locally via `act push --workflows .github/workflows/ci.yml --job e2e`
  # (or whichever jobs you want to exercise). `make ci-run` does not include
  # an act-side skip because `env` is not available in job-level `if:`.
  e2e-kind:
    needs: [changes, build, test]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json

      - name: Install CLI tooling via mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: latest

      - name: Create KinD cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: dapr-kafka
          node_image: kindest/node:v1.35.0@sha256:452d707d4862f52530247495d180205e029056831160e22870e37e3f6c1ac31f
          wait: 120s

      - name: Install Dapr control plane
        run: make k8s-dapr-deploy

      - name: Install Strimzi operator + Kafka cluster
        run: make k8s-kafka-deploy

      - name: Deploy producer + consumer
        run: make k8s-workload-deploy

      - name: Verify pub/sub round-trip
        run: make k8s-test

      - name: Diagnostic dump on failure
        if: failure()
        run: |
          set +e
          kubectl --context=kind-dapr-kafka get pods -A -o wide
          echo "--- producer/daprd ---"
          kubectl --context=kind-dapr-kafka logs -n dapr-app -l app=producer -c daprd --tail=80 || true
          echo "--- consumer/daprd ---"
          kubectl --context=kind-dapr-kafka logs -n dapr-app -l app=consumer -c daprd --tail=80 || true
          echo "--- consumer/app ---"
          kubectl --context=kind-dapr-kafka logs -n dapr-app -l app=consumer -c consumer --tail=80 || true
          echo "--- strimzi-cluster-operator ---"
          kubectl --context=kind-dapr-kafka logs -n kafka -l name=strimzi-cluster-operator --tail=80 || true
          echo "--- Kafka CR status ---"
          kubectl --context=kind-dapr-kafka get kafka,kafkanodepool,kafkatopic -n kafka -o wide || true

  docker:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, test, integration-test]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write
      id-token: write   # cosign keyless OIDC (Sigstore Fulcio)

    env:
      REGISTRY: ghcr.io
      # renovate: datasource=github-releases depName=GoogleContainerTools/container-structure-test
      CST_VERSION: v1.22.1
      # renovate: datasource=docker depName=zaproxy/zaproxy registryUrl=https://ghcr.io
      ZAP_VERSION: "2.17.0"

    strategy:
      fail-fast: false
      matrix:
        include:
          - app: producer
            dockerfile: producer/Dockerfile
            boot_marker: 'Publishing data:'
          - app: consumer
            dockerfile: consumer/Dockerfile
            boot_marker: 'Now listening on:|Application started'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.app }}
          flavor: |
            latest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.vendor=Andriy Kalashnykov - andriykalashnykov@gmail.com
            org.opencontainers.image.title=Dapr Kafka ${{ matrix.app }}
            org.opencontainers.image.description=Dapr PubSub ${{ matrix.app }} with Apache Kafka in C#
            org.opencontainers.image.licenses=MIT
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/AndriyKalashnykov/dapr-kafka-csharp/main/README.md
            io.artifacthub.package.maintainers=[{"name":"Andriy Kalashnykov","email":"andriykalashnykov@gmail.com"}]
            io.artifacthub.package.license=MIT

      # Gate 1: Local single-arch build for scanning + smoke testing.
      - name: Build image for scan
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          load: true
          tags: ${{ matrix.app }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Gate 2: Trivy image scan (CRITICAL/HIGH blocking).
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ matrix.app }}:scan
          scanners: 'vuln,secret,misconfig'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      # Gate 2.5: container-structure-test — asserts image contents/metadata
      # (dotnet runtime resolves, expected .dll files present at /app, USER is
      # non-root UID 1654, ENTRYPOINT/WORKDIR match the Dockerfile).
      - name: Install container-structure-test
        run: |
          set -euo pipefail
          curl -fsSL -o cst "https://storage.googleapis.com/container-structure-test/${CST_VERSION}/container-structure-test-linux-amd64"
          chmod +x cst
          sudo mv cst /usr/local/bin/container-structure-test

      - name: Container structure test
        run: container-structure-test test --image "${{ matrix.app }}:scan" --config "tests/structure/${{ matrix.app }}.yaml"

      # Gate 3: Smoke test — boot-marker grep (NOT health-curl; both apps
      # depend on the Dapr sidecar and would false-negative on /health).
      # Keeps the container running for the consumer DAST step below.
      - name: Smoke test
        env:
          APP: ${{ matrix.app }}
          MARKER: ${{ matrix.boot_marker }}
        run: |
          set -euo pipefail
          docker rm -f "${APP}-smoke" 2>/dev/null || true
          docker run -d --name="${APP}-smoke" -p 6000:6000 "${APP}:scan"
          echo "Waiting up to 30s for boot marker \"${MARKER}\"..."
          end=$((SECONDS + 30))
          while [ $SECONDS -lt $end ]; do
            if docker logs "${APP}-smoke" 2>&1 | grep -qE "${MARKER}"; then
              echo "PASS: ${APP} matched boot marker"
              exit 0
            fi
            sleep 2
          done
          echo "FAIL: ${APP} did not hit boot marker within 30s"
          docker logs "${APP}-smoke" || true
          exit 1

      # Gate 3.5: DAST baseline against the running consumer (consumer only — the
      # producer is a console app with no HTTP listener). ZAP baseline reports
      # passive findings (security headers, TLS posture). continue-on-error
      # because the consumer rejects every non-CloudEvents request, which
      # generates noise in the report without indicating a real vulnerability;
      # use the uploaded artifact to triage findings rather than failing CI.
      - name: DAST — OWASP ZAP baseline (consumer)
        if: matrix.app == 'consumer' && !env.ACT
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p zap-report
          chmod 777 zap-report   # ZAP writes report files as the container user
          docker run --rm --network=host \
            -v "$(pwd)/zap-report:/zap/wrk/:rw" \
            "ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}" \
            zap-baseline.py \
              -t http://localhost:6000 \
              -r zap-report.html \
              -J zap-report.json \
              -I

      - name: Upload DAST report
        if: matrix.app == 'consumer' && always() && !env.ACT
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zap-baseline-${{ matrix.app }}
          path: zap-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Cleanup smoke container
        if: always()
        run: docker rm -f "${{ matrix.app }}-smoke" 2>/dev/null || true

      # All gates passed — publish multi-arch (Pattern A: clean image index).
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false   # Pattern A — keep image index free of unknown/unknown so GHCR "OS / Arch" tab renders.
          sbom: false         # Pattern A — cosign keyless signing below provides supply-chain verification.
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Phase 2 (post-push): cosign keyless OIDC signing.
      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image with cosign
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "-> cosign sign ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "${TAGS}"

  ci-pass:
    if: always()
    needs: [changes, static-check, build, test, integration-test, e2e, e2e-kind, docker]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs were cancelled"
            exit 1
          fi
          echo "All required jobs passed or were skipped."
