name: Cleanup old workflow runs

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
  workflow_call:

concurrency:
  group: cleanup
  cancel-in-progress: true

permissions:
  actions: write
  contents: read        # required by `gh api .../actions/caches` on private repos
  pull-requests: read   # required by `gh pr list` (retain open-PR runs, below)

jobs:
  cleanup-runs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      RETAIN_DAYS: 7
      KEEP_MINIMUM: 5
    steps:
      - name: Delete old workflow runs
        run: |
          CUTOFF=$(date -u -d "$RETAIN_DAYS days ago" +%Y-%m-%dT%H:%M:%SZ)
          # Head SHAs of OPEN PRs — their run carries the required status check;
          # deleting it strands the PR on a MISSING check (BLOCKED, 0 checks). Retain
          # regardless of age.
          OPEN_SHAS=$(gh pr list --repo "${{ github.repository }}" --state open \
            --json headRefOid --jq '[.[].headRefOid]')
          # Retain the newest KEEP_MINIMUM runs PER WORKFLOW (group_by .workflowName),
          # THEN delete any remaining run older than CUTOFF whose head SHA is not an
          # open PR. A single GLOBAL minimum would deregister low-frequency workflows
          # (deleting the last CI run flips ci.yml to state:deleted, dropping ci-pass).
          gh run list --repo "${{ github.repository }}" \
            --json databaseId,createdAt,workflowName,headSha --limit 300 \
          | jq -r --arg cutoff "$CUTOFF" --argjson keep "$KEEP_MINIMUM" --argjson open "$OPEN_SHAS" '
              group_by(.workflowName)
              | map(sort_by(.createdAt) | reverse | .[$keep:])
              | add // []
              | .[]
              | select(.createdAt < $cutoff)
              | select(.headSha as $s | ($open | index($s)) | not)
              | .databaseId
            ' \
          | xargs -r -I{} gh run delete {} --repo "${{ github.repository }}"

  cleanup-caches:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Prune caches from deleted branches
        run: |
          gh api "repos/${{ github.repository }}/actions/caches?per_page=100" \
            --jq '.actions_caches[] | select(.ref | startswith("refs/pull/")) | .id' \
          | xargs -r -I{} gh api -X DELETE "repos/${{ github.repository }}/actions/caches/{}" 2>/dev/null || true
