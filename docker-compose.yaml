# 3-node Apache Kafka KRaft cluster.
#
# Migrated from bitnamilegacy/kafka in 2026-04. The previous config used SASL+SSL,
# which relied on Bitnami entrypoint helpers that don't exist in the upstream
# Apache Kafka image. Plaintext is adequate for the demo and for Dapr pub/sub
# end-to-end tests; reinstating SASL+SSL requires mounting a JAAS config file.
#
# Note: the default Dapr component in components/kafka-pubsub.yaml and
# k8s/kafka-pubsub.yaml points at a single-broker plaintext broker on :9092.
# To use this 3-node setup, update the component's `brokers` field to
# "localhost:9094,localhost:9095,localhost:9096" (the external ports below).

networks:
  kafka-net:
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16

services:
  kafka-1:
    networks:
      kafka-net:
        ipv4_address: ${KAFKA_HOST_1}
    image: ${KAFKA_IMAGE}
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "controller,broker"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@${KAFKA_HOST_1}:9093,2@${KAFKA_HOST_2}:9093,3@${KAFKA_HOST_3}:9093"
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_LISTENERS: "INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://${KAFKA_HOST_1}:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - "kafka_1_data:/var/lib/kafka/data"

  kafka-2:
    networks:
      kafka-net:
        ipv4_address: ${KAFKA_HOST_2}
    image: ${KAFKA_IMAGE}
    ports:
      - "9095:9094"
    environment:
      KAFKA_NODE_ID: "2"
      KAFKA_PROCESS_ROLES: "controller,broker"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@${KAFKA_HOST_1}:9093,2@${KAFKA_HOST_2}:9093,3@${KAFKA_HOST_3}:9093"
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_LISTENERS: "INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://${KAFKA_HOST_2}:9092,EXTERNAL://localhost:9095"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - "kafka_2_data:/var/lib/kafka/data"

  kafka-3:
    networks:
      kafka-net:
        ipv4_address: ${KAFKA_HOST_3}
    image: ${KAFKA_IMAGE}
    ports:
      - "9096:9094"
    environment:
      KAFKA_NODE_ID: "3"
      KAFKA_PROCESS_ROLES: "controller,broker"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@${KAFKA_HOST_1}:9093,2@${KAFKA_HOST_2}:9093,3@${KAFKA_HOST_3}:9093"
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_LISTENERS: "INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://${KAFKA_HOST_3}:9092,EXTERNAL://localhost:9096"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - "kafka_3_data:/var/lib/kafka/data"

volumes:
  kafka_1_data:
    driver: local
  kafka_2_data:
    driver: local
  kafka_3_data:
    driver: local
