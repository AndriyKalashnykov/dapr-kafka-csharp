[tools]
# .NET SDK (source of truth: global.json sdk.version — mise reads global.json natively via .mise.toml disambiguation).
# Note: mise's dotnet provider is symlink-only — it points at the host's Microsoft installer (~/.dotnet)
# rather than installing a separate SDK. Keep this pin aligned with global.json.
dotnet = "10.0.203"

# Node used only for Renovate CLI via npx
node = "24"

# All `aqua:*` tools below are tracked natively by mise's `mise` manager
# (queries the aqua registry via the github-tags datasource). No `# renovate:`
# annotations here — Renovate's mise manager would ignore them, and keeping
# them invites a future contributor to add a duplicate `custom.regex` manager
# (the duplicate-PR trap documented in /renovate skill §".mise.toml — DO NOT add").
"aqua:hadolint/hadolint" = "2.14.0"
"aqua:nektos/act" = "0.2.87"
"aqua:dapr/cli" = "1.17.1"
"aqua:aquasecurity/trivy" = "0.70.0"
"aqua:gitleaks/gitleaks" = "8.30.1"
"aqua:kubernetes-sigs/kind" = "0.31.0"
"aqua:kubernetes-sigs/cloud-provider-kind" = "0.10.0"
"aqua:kubernetes/kubectl" = "1.35.4"
"aqua:helm/helm" = "3.20.2"
