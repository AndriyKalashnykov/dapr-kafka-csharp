networks:
  kafka-net:
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16

services:
  
  zookeeper:
    
    networks:
      kafka-net:
        ipv4_address: 172.28.1.2
        
    image: wurstmeister/zookeeper:latest@sha256:7a7fd44a72104bfbd24a77844bad5fabc86485b036f988ea927d1780782a6680
    ports:
      - "2181:2181"
  
  kafka:
    networks:
      kafka-net:
        ipv4_address: 172.28.1.1
        
    depends_on:
      - zookeeper
    image: wurstmeister/kafka:latest@sha256:2d4bbf9cc83d9854d36582987da5f939fb9255fb128d18e3cf2c6ad825a32751
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_HOST_NAME: 127.0.0.1
      KAFKA_CREATE_TOPICS: "sampletopic:1:1"
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
