apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: sampletopic
spec:
  type: pubsub.kafka
  version: v1
  initTimeout: 30s
  metadata:
    # Strimzi exposes a single bootstrap service for client traffic — kafkanode
    # pods are addressed indirectly via the bootstrap on port 9092 (plaintext).
    - name: brokers
      value: "dapr-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
    - name: authType
      value: "none"
    - name: disableTls
      value: "true"
    - name: maxMessageBytes
      value: 1024000
    - name: consumeRetryInterval
      value: 200ms
