# Strimzi Kafka cluster (single-broker KRaft, plaintext) for the K8s Dapr pub/sub demo.
#
# Replaces the legacy Bitnami chart + bitnamilegacy/kafka image with upstream Apache Kafka
# orchestrated by the Strimzi operator. The operator is installed separately via Helm
# (`make k8s-kafka-deploy` → scripts/kafka.sh → strimzi/strimzi-kafka-operator chart).
#
# Bootstrap service for clients (Dapr pubsub component, kafka CLI, etc.):
#   dapr-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092
#
# API version: kafka.strimzi.io/v1 — required by Strimzi 1.0.0+ (the older v1beta2 /
# v1beta1 / v1alpha1 APIs were removed). Pre-1.0 clusters need the conversion procedure
# at https://strimzi.io/docs/operators/1.0.0/deploying.html#assembly-api-conversion-str
# before upgrading the operator; this project is being deployed fresh against 1.0+
# so the CR is authored as v1 directly.
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: dual-role
  namespace: kafka
  labels:
    strimzi.io/cluster: dapr-kafka
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: ephemeral
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: dapr-kafka
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    # Kafka version comes from the operator's bundled image — Strimzi pulls
    # quay.io/strimzi/kafka:<operator-version>-kafka-<this-version> automatically.
    # Strimzi 1.0.0 bundles Kafka 4.1.0, 4.1.1, 4.1.2, and 4.2.0 — picking 4.2.0
    # to match the Compose-path broker (.env KAFKA_IMAGE).
    version: 4.2.0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      auto.create.topics.enable: true
  entityOperator:
    topicOperator: {}
    userOperator: {}
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: sampletopic
  namespace: kafka
  labels:
    strimzi.io/cluster: dapr-kafka
spec:
  partitions: 1
  replicas: 1
  config:
    retention.ms: 7200000      # 2h — demo only, expire fast
    segment.bytes: 1073741824
